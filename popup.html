<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>よむ時間めやす</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-raised: #ffffff;
      --border: #cbd5e1;
      --border-soft: #e2e8f0;
      --control-border: #64748b;
      --text: #0f172a;
      --muted: #475569;
      --muted-strong: #334155;
      --accent: #2563eb;
      --accent-text: #1d4ed8;
      --accent-soft: #dbeafe;
      --accent-border: #93c5fd;
      --focus: #1d4ed8;
      --focus-shadow: rgba(37, 99, 235, 0.20);
      --success: #15803d;
      --success-soft: #dcfce7;
      --success-border: #86efac;
      --warning: #92400e;
      --warning-soft: #fef3c7;
      --warning-border: #fbbf24;
      --error: #b91c1c;
      --error-soft: #fee2e2;
      --error-border: #fca5a5;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 380px;
      margin: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    .popup-shell {
      display: grid;
      gap: 14px;
    }

    .header {
      display: grid;
      gap: 6px;
      padding: 2px 4px 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .result-card {
      position: relative;
      display: grid;
      gap: 10px;
      overflow: hidden;
      padding: 18px 18px 20px;
      border-color: var(--accent-border);
    }

    .result-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent);
    }

    .result-card.is-loading {
      border-color: var(--border);
      background: linear-gradient(180deg, var(--surface-muted), var(--surface));
    }

    .result-card.is-loading::before {
      background: var(--muted);
    }

    .result-card.is-ready {
      border-color: var(--success-border);
      background: linear-gradient(180deg, #f0fdf4, var(--surface) 54%);
    }

    .result-card.is-ready::before {
      background: var(--success);
    }

    .result-card.is-empty {
      border-color: var(--warning-border);
      background: linear-gradient(180deg, #fffbeb, var(--surface) 54%);
    }

    .result-card.is-empty::before {
      background: var(--warning);
    }

    .result-card.is-error {
      border-color: var(--error-border);
      background: linear-gradient(180deg, #fef2f2, var(--surface) 54%);
    }

    .result-card.is-error::before {
      background: var(--error);
    }

    .status-label,
    .stats,
    .help-text,
    .state-action,
    .onboarding-guide,
    .premium-area {
      color: var(--muted);
      font-size: 12px;
    }

    .result-heading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      min-height: 24px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-text);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status-label::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
    }

    .result-card.is-loading .status-label {
      background: var(--surface-muted);
      color: var(--muted);
    }

    .result-card.is-ready .status-label {
      background: var(--success-soft);
      color: var(--success);
    }

    .result-card.is-empty .status-label {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .result-card.is-error .status-label {
      background: var(--error-soft);
      color: var(--error);
    }

    .result-body {
      display: grid;
      gap: 6px;
      min-height: 86px;
      align-content: center;
      padding: 14px;
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
    }

    .result-card.is-ready .result-body {
      border-color: var(--success-border);
      background: rgba(240, 253, 244, 0.74);
    }

    .result-card.is-empty .result-body {
      border-color: var(--warning-border);
      background: rgba(255, 251, 235, 0.78);
    }

    .result-card.is-error .result-body {
      border-color: var(--error-border);
      background: rgba(254, 242, 242, 0.78);
    }

    .result {
      color: var(--text);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .result-card.is-loading .result,
    .result-card.is-empty .result,
    .result-card.is-error .result {
      color: var(--muted);
      font-size: 20px;
      letter-spacing: -0.01em;
    }

    .stats {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }

    .help-text,
    .state-action,
    .onboarding-guide {
      margin: 0;
    }

    .help-text {
      color: var(--muted-strong);
      line-height: 1.6;
    }

    .state-action {
      padding: 8px 10px;
      border: 1px solid var(--warning-border);
      border-radius: 10px;
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 700;
      line-height: 1.5;
    }

    .onboarding-guide {
      padding: 10px 12px;
      border: 1px solid var(--accent-border);
      border-radius: 12px;
      background: #eff6ff;
      color: #1e3a8a;
      font-weight: 600;
    }

    .controls,
    .settings {
      padding: 15px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .controls legend {
      grid-column: 1 / -1;
    }

    .choice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 52px;
      padding: 10px 12px;
      border: 1px solid var(--control-border);
      border-radius: 10px;
      background: var(--surface-raised);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }

    .choice:hover {
      border-color: var(--accent);
      background: #f8fbff;
    }

    .choice:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1e3a8a;
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .choice:has(input:focus-visible),
    .setting-row input:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      box-shadow: 0 0 0 5px var(--focus-shadow);
    }

    .choice:has(input:focus-visible),
    .setting-row input:focus-visible {
      border-color: var(--focus);
    }

    .choice input {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: var(--accent);
    }

    .settings {
      display: grid;
      gap: 14px;
    }

    .control-group {
      margin: 0;
      min-inline-size: 0;
    }

    .control-group legend {
      margin-bottom: 8px;
      padding: 0;
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(132px, auto);
      gap: 10px;
      align-items: center;
      min-height: 52px;
      padding: 8px 0;
      border-top: 1px solid var(--border-soft);
      color: var(--muted);
      font-size: 13px;
    }

    .setting-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .setting-row:last-of-type {
      padding-bottom: 0;
    }

    .setting-label {
      color: var(--text);
      font-weight: 600;
    }

    .setting-control {
      display: inline-grid;
      grid-template-columns: 88px auto;
      gap: 8px;
      align-items: center;
      white-space: nowrap;
    }

    .setting-row input {
      width: 88px;
      min-height: 52px;
      border: 1px solid var(--control-border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      text-align: right;
    }

    .premium-area {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .premium-status {
      font-weight: 700;
      line-height: 1.4;
    }

    .premium-status--premium,
    .premium-status--trial {
      color: var(--success);
    }

    .premium-status--free {
      color: var(--error);
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 999px;
      min-width: 52px;
      min-height: 52px;
      padding: 10px 16px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main id="app" class="popup-shell" aria-labelledby="app-title">
    <header class="header">
      <h1 id="app-title">よむ時間めやす</h1>
      <p id="app-subtitle" class="app-subtitle">今のページを読むのにかかる時間の目安を表示。長文の見通しに。</p>
    </header>

    <p id="onboarding-guide" class="onboarding-guide" hidden>まず記事ページで開いてください。読了時間が出たら、下の言語と読む速さで調整できます。</p>

    <section id="result-card" class="card result-card is-loading" role="status" aria-live="polite" aria-atomic="true" aria-busy="true" aria-labelledby="status-label" aria-describedby="stats result-help result-action">
      <div class="result-heading">
        <div id="status-label" class="status-label">読み取り中</div>
      </div>
      <div class="result-body">
        <div id="reading-time" class="result">…</div>
        <div id="stats" class="stats">…</div>
      </div>
      <p id="result-help" class="help-text" hidden></p>
      <p id="result-action" class="state-action" hidden></p>
    </section>

    <fieldset class="card controls control-group" aria-labelledby="language-legend">
      <legend id="language-legend">本文の言語</legend>
      <label class="choice"><input type="radio" name="lang" value="ja" aria-labelledby="label-lang-ja" checked> <span id="label-lang-ja">日本語</span></label>
      <label class="choice"><input type="radio" name="lang" value="en" aria-labelledby="label-lang-en"> <span id="label-lang-en">English</span></label>
    </fieldset>

    <fieldset class="card settings control-group" aria-labelledby="settings-legend">
      <legend id="settings-legend">読む速さ</legend>
      <label class="setting-row">
        <span id="label-speed-ja" class="setting-label">読む速さ（日本語）</span>
        <span class="setting-control">
          <input type="number" id="speed-ja" value="400" inputmode="numeric" aria-labelledby="label-speed-ja" aria-describedby="unit-speed-ja">
          <span id="unit-speed-ja">字/分</span>
        </span>
      </label>
      <label class="setting-row">
        <span id="label-speed-en" class="setting-label">読む速さ（英語）</span>
        <span class="setting-control">
          <input type="number" id="speed-en" value="200" inputmode="numeric" aria-labelledby="label-speed-en" aria-describedby="unit-speed-en">
          <span id="unit-speed-en">語/分</span>
        </span>
      </label>
    </fieldset>

    <div id="premium-area" class="premium-area">
      <span id="premium-status" class="premium-status" aria-live="polite"></span>
      <button id="upgrade-btn" type="button" aria-describedby="premium-status" style="display: none;"></button>
    </div>
  </main>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
