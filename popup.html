<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>よむ時間めやす</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-muted: #f1f5f9;
      --border: #d8e0ea;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --focus: #1d4ed8;
      --success: #15803d;
      --warning: #92400e;
      --error: #b91c1c;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .popup-shell {
      display: grid;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .result-card {
      display: grid;
      gap: 6px;
      padding: 14px;
      border-left: 4px solid var(--accent);
    }

    .result-card.is-loading {
      border-left-color: var(--muted);
    }

    .result-card.is-empty {
      border-left-color: var(--warning);
    }

    .result-card.is-error {
      border-left-color: var(--error);
    }

    .status-label,
    .stats,
    .premium-area {
      color: var(--muted);
      font-size: 12px;
    }

    .status-label {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .result {
      min-height: 34px;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .controls,
    .settings {
      padding: 12px;
    }

    .controls {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-muted);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }

    .choice:has(input:checked) {
      border-color: var(--accent);
      background: #dbeafe;
    }

    .choice:has(input:focus-visible),
    .setting-row input:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .choice input {
      margin: 0;
      accent-color: var(--accent);
    }

    .settings {
      display: grid;
      gap: 10px;
      border: 1px solid var(--border);
    }

    .control-group {
      margin: 0;
      min-inline-size: 0;
    }

    .control-group legend {
      margin-bottom: 8px;
      padding: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .setting-row + .setting-row {
      margin-top: 10px;
    }

    .setting-row input {
      width: 82px;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      color: var(--text);
      font: inherit;
      text-align: right;
    }

    .premium-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .premium-status {
      font-weight: 700;
    }

    .premium-status--premium,
    .premium-status--trial {
      color: var(--success);
    }

    .premium-status--free {
      color: var(--error);
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 999px;
      min-width: 44px;
      min-height: 44px;
      padding: 9px 14px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main id="app" class="popup-shell">
    <header class="header">
      <h1 id="app-title">よむ時間めやす</h1>
    </header>

    <section id="result-card" class="card result-card is-loading" aria-live="polite" aria-atomic="true" aria-busy="true" aria-labelledby="status-label" aria-describedby="stats">
      <div id="status-label" class="status-label">読み込み中</div>
      <div id="reading-time" class="result">…</div>
      <div id="stats" class="stats">…</div>
    </section>

    <fieldset class="card controls control-group">
      <legend id="language-legend">表示言語</legend>
      <label class="choice"><input type="radio" name="lang" value="ja" checked> <span id="label-lang-ja">日本語</span></label>
      <label class="choice"><input type="radio" name="lang" value="en"> <span id="label-lang-en">English</span></label>
    </fieldset>

    <fieldset class="card settings control-group">
      <legend id="settings-legend">読む速さ</legend>
      <label class="setting-row">
        <span id="label-speed-ja">読む速さ（日本語）</span>
        <input type="number" id="speed-ja" value="400" inputmode="numeric" aria-describedby="unit-speed-ja">
        <span id="unit-speed-ja">字/分</span>
      </label>
      <label class="setting-row">
        <span id="label-speed-en">読む速さ（英語）</span>
        <input type="number" id="speed-en" value="200" inputmode="numeric" aria-describedby="unit-speed-en">
        <span id="unit-speed-en">語/分</span>
      </label>
    </fieldset>

    <div id="premium-area" class="premium-area">
      <span id="premium-status" class="premium-status"></span>
      <button id="upgrade-btn" style="display: none;"></button>
    </div>
  </main>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
